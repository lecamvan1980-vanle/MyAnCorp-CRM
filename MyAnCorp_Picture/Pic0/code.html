<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập | Myan Corp CRM</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary": "#ffffff",
                    "on-tertiary-container": "#fcfcff",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#c1c7cf",
                    "surface-container": "#eceef1",
                    "outline-variant": "#bec8ce",
                    "on-background": "#191c1e",
                    "outline": "#6e797e",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#74d2f9",
                    "surface-variant": "#e0e3e6",
                    "secondary-fixed-dim": "#bcc7dd",
                    "background": "#f7f9fc",
                    "tertiary-fixed": "#dde3eb",
                    "surface": "#f7f9fc",
                    "surface-container-high": "#e6e8eb",
                    "secondary-container": "#d5e0f7",
                    "on-secondary-fixed-variant": "#3c475a",
                    "primary-container": "#007ea1",
                    "surface-dim": "#d8dadd",
                    "on-secondary-container": "#586377",
                    "inverse-surface": "#2d3133",
                    "on-primary-container": "#fbfdff",
                    "on-secondary-fixed": "#111c2c",
                    "on-primary-fixed": "#001f2a",
                    "surface-tint": "#006783",
                    "inverse-on-surface": "#eff1f4",
                    "surface-container-low": "#f2f4f7",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed": "#bce9ff",
                    "tertiary-container": "#6f757c",
                    "secondary": "#545f72",
                    "on-tertiary-fixed-variant": "#41474e",
                    "surface-bright": "#f7f9fc",
                    "error-container": "#ffdad6",
                    "on-primary": "#ffffff",
                    "on-primary-fixed-variant": "#004d64",
                    "tertiary": "#565d63",
                    "inverse-primary": "#74d2f9",
                    "on-surface-variant": "#3e484d",
                    "secondary-fixed": "#d8e3fa",
                    "on-surface": "#191c1e",
                    "surface-container-highest": "#e0e3e6",
                    "on-tertiary-fixed": "#161c22",
                    "primary": "#006480",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "4px",
                    "stack-sm": "8px",
                    "stack-md": "16px",
                    "container-padding": "24px",
                    "card-gap": "20px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "display-md": ["Inter"],
                    "label-md": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-sm": ["Inter"],
                    "label-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "display-lg": ["Inter"],
                    "display-lg-mobile": ["Inter"]
            },
            "fontSize": {
                    "display-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-md": ["13px", {"lineHeight": "18px", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "display-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F7FA;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card {
            box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-container-padding">
<!-- Main Login Card -->
<main class="login-card bg-surface-container-lowest w-full max-w-[440px] rounded-xl p-8 md:p-10 transition-all duration-300">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-2 mb-6">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<h2 class="font-display-md text-display-md font-bold text-primary tracking-tight">Myan Corp</h2>
</div>
<h1 class="font-display-md text-display-md text-on-surface text-center">Đăng nhập hệ thống</h1>
<p class="font-body-md text-body-md text-secondary mt-2 text-center">Hệ thống quản lý thiết bị y tế chuyên nghiệp</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" onsubmit="return false;">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="email" name="email" placeholder="vd@email.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="password">Mật khẩu</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Quên mật khẩu?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-[#0084A8] hover:bg-[#006b88] active:scale-[0.98] text-white font-label-md text-label-md py-3.5 rounded-lg transition-all shadow-sm flex justify-center items-center gap-2" type="submit">
                Đăng nhập
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-6 border-t border-surface-variant text-center">
<p class="font-body-md text-body-md text-secondary">
                Chưa có tài khoản? 
                <a class="text-primary font-semibold hover:underline ml-1" href="#">Đăng ký ngay</a>
</p>
</div>
</main>
<!-- Background Decorative Element (Optional but subtle) -->
<div class="fixed bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-surface-container-high/30 to-transparent -z-10"></div>
<script>
        // Micro-interaction for the password visibility toggle
        document.querySelector('button[type="button"]').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon = this.querySelector('span');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        });

        // Add visual feedback on focus/blur for the whole card
        const inputs = document.querySelectorAll('input');
        const card = document.querySelector('.login-card');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                card.style.boxShadow = '0px 10px 25px -5px rgba(0, 132, 168, 0.08)';
            });
            input.addEventListener('blur', () => {
                card.style.boxShadow = '0px 2px 4px rgba(0, 0, 0, 0.05)';
            });
        });
    </script>
</body></html>
